<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Background Remover</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
        }

        .upload-area {
            background: white;
            border: 2px dashed #ddd;
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }

        .upload-area:hover {
            border-color: #007AFF;
            background: #f8f9ff;
        }

        .upload-area.dragover {
            border-color: #007AFF;
            background: #e8f4ff;
        }

        .upload-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .upload-text {
            color: #666;
            font-size: 16px;
        }

        .upload-hint {
            color: #999;
            font-size: 14px;
            margin-top: 8px;
        }

        #fileInput {
            display: none;
        }

        .preview-section {
            display: none;
            margin-top: 30px;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .preview-section.show {
            display: flex;
        }

        .preview-box {
            background: white;
            padding: 16px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            text-align: center;
        }

        .preview-title {
            font-size: 14px;
            color: #666;
            margin-bottom: 12px;
        }

        .preview-img {
            max-width: 300px;
            max-height: 300px;
            border-radius: 8px;
        }

        .checkerboard {
            background-image: 
                linear-gradient(45deg, #ccc 25%, transparent 25%),
                linear-gradient(-45deg, #ccc 25%, transparent 25%),
                linear-gradient(45deg, transparent 75%, #ccc 75%),
                linear-gradient(-45deg, transparent 75%, #ccc 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
            background-color: #fff;
        }

        .download-btn {
            display: none;
            margin: 30px auto;
            padding: 14px 32px;
            background: #007AFF;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .download-btn:hover {
            background: #0056b3;
        }

        .download-btn.show {
            display: block;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 40px;
        }

        .loading.show {
            display: block;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #007AFF;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error-message {
            display: none;
            background: #ffeaea;
            color: #d32f2f;
            padding: 16px;
            border-radius: 8px;
            margin-top: 20px;
            text-align: center;
        }

        .error-message.show {
            display: block;
        }

        .footer {
            text-align: center;
            margin-top: 40px;
            color: #999;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🖼️ Image Background Remover</h1>
        
        <div class="upload-area" id="uploadArea">
            <div class="upload-icon">📤</div>
            <div class="upload-text">点击或拖拽上传图片</div>
            <div class="upload-hint">支持 JPG, PNG，大小 ≤ 10MB</div>
            <input type="file" id="fileInput" accept="image/jpeg,image/png">
        </div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <div>正在处理图片...</div>
        </div>

        <div class="error-message" id="errorMessage"></div>

        <div class="preview-section" id="previewSection">
            <div class="preview-box">
                <div class="preview-title">原图</div>
                <img id="originalPreview" class="preview-img" alt="Original">
            </div>
            <div class="preview-box">
                <div class="preview-title">去背景后</div>
                <img id="resultPreview" class="preview-img checkerboard" alt="Result">
            </div>
        </div>

        <button class="download-btn" id="downloadBtn">⬇️ 下载 PNG</button>

        <div class="footer">
            Powered by Remove.bg API · 每月免费 50 张
        </div>
    </div>

    <script>
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const loading = document.getElementById('loading');
        const previewSection = document.getElementById('previewSection');
        const originalPreview = document.getElementById('originalPreview');
        const resultPreview = document.getElementById('resultPreview');
        const downloadBtn = document.getElementById('downloadBtn');
        const errorMessage = document.getElementById('errorMessage');

        let processedImageData = null;

        // 替换为你的 Cloudflare Workers URL
        const API_URL = 'https://your-worker.your-subdomain.workers.dev';

        uploadArea.addEventListener('click', () => fileInput.click());

        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            const files = e.dataTransfer.files;
            if (files.length > 0) handleFile(files[0]);
        });

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) handleFile(e.target.files[0]);
        });

        function handleFile(file) {
            // 验证文件
            if (!file.type.match(/^image\/(jpeg|png)$/)) {
                showError('仅支持 JPG 和 PNG 格式');
                return;
            }
            if (file.size > 10 * 1024 * 1024) {
                showError('文件大小不能超过 10MB');
                return;
            }

            hideError();
            
            // 预览原图
            const reader = new FileReader();
            reader.onload = (e) => {
                originalPreview.src = e.target.result;
                processImage(file);
            };
            reader.readAsDataURL(file);
        }

        async function processImage(file) {
            // 显示加载状态
            loading.classList.add('show');
            previewSection.classList.remove('show');
            downloadBtn.classList.remove('show');
            hideError();

            try {
                // 转 Base64
                const base64 = await fileToBase64(file);
                const base64Data = base64.split(',')[1];

                // 调用 API
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        image: base64Data,
                        filename: file.name
                    })
                });

                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.message || '处理失败');
                }

                const result = await response.json();
                
                if (result.success && result.image) {
                    processedImageData = result.image;
                    resultPreview.src = `data:image/png;base64,${result.image}`;
                    previewSection.classList.add('show');
                    downloadBtn.classList.add('show');
                } else {
                    throw new Error(result.message || '处理失败');
                }

            } catch (error) {
                showError(error.message || '网络错误，请稍后重试');
            } finally {
                loading.classList.remove('show');
            }
        }

        function fileToBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => resolve(reader.result);
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        }

        downloadBtn.addEventListener('click', () => {
            if (!processedImageData) return;
            
            const link = document.createElement('a');
            link.href = `data:image/png;base64,${processedImageData}`;
            link.download = 'removed-background.png';
            link.click();
        });

        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.classList.add('show');
        }

        function hideError() {
            errorMessage.classList.remove('show');
        }
    </script>
</body>
</html>
